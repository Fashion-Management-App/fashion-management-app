<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Add Record — Fashion Management</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 150px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      h1 {
        color: #333;
      }
      .form-group {
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-weight: bold;
        margin-bottom: 4px;
      }
      input[type="text"],
      input[type="number"] {
        width: 400px;
        padding: 7px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }
      .btn-submit {
        padding: 9px 20px;
        background-color: #2a7ae2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn-submit:hover {
        background-color: #1a5abf;
      }
      .btn-back {
        display: inline-block;
        margin-left: 10px;
        color: #555;
        text-decoration: none;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h1>Add New Record</h1>

    <form th:action="@{/add}" th:object="${fashion}" method="post">
      <div class="form-group">
        <label>Customer</label>
        <input
          type="text"
          th:field="*{customer}"
          placeholder="e.g. Катерина Лисенко"
        />
      </div>
      <div class="form-group">
        <label>Couturier</label>
        <input
          type="text"
          th:field="*{couturier}"
          placeholder="e.g. Maison Aurore"
        />
      </div>
      <div class="form-group">
        <label>Fitting Date</label>
        <input
          type="text"
          th:field="*{fittingDate}"
          placeholder="e.g. 2024-09-14"
        />
      </div>
      <div class="form-group">
        <label>Item Model</label>
        <input
          type="text"
          th:field="*{itemModel}"
          placeholder="e.g. Сукня Luna"
        />
      </div>
      <div class="form-group">
        <label>Sizes</label>
        <input
          type="text"
          th:field="*{sizes}"
          placeholder="e.g. груди:90; талія:70; бедра:95"
        />
      </div>
      <div class="form-group">
        <label>Fabrics</label>
        <input
          type="text"
          th:field="*{fabrics}"
          placeholder="e.g. шовк; мереживо"
        />
      </div>
      <div class="form-group">
        <label>Customer Level</label>
        <input
          type="text"
          th:field="*{customerLevel}"
          placeholder="e.g. Gold"
        />
      </div>
      <div class="form-group">
        <label>Couturier Experience (years)</label>
        <input
          type="number"
          th:field="*{couturierExperience}"
          placeholder="e.g. 12"
        />
      </div>
      <div class="form-group">
        <label>Atelier Address</label>
        <input
          type="text"
          th:field="*{atelierAddress}"
          placeholder="e.g. м. Київ, вул. Стильна, 3"
        />
      </div>
      <div class="form-group">
        <label>Atelier Phone</label>
        <input
          type="number"
          th:field="*{atelierPhone}"
          placeholder="e.g. 380449910901"
        />
      </div>

      <button class="btn-submit" type="submit">Save</button>
      <a class="btn-back" href="/">← Back</a>
    </form>
  </body>
</html>
