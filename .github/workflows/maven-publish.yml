name: Publish to GitHub Packages

on:
  push:
    branches: [ mongodb ]
    tags-ignore:
      - '*'
  pull_request:
    branches: [ mongodb ]

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Run unit tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: mvn clean package --no-transfer-progress
        working-directory: fashion-app-mongodb

      - name: Run integration tests
        run: mvn verify --no-transfer-progress -DskipTests=true
        working-directory: fashion-app-mongodb

      - name: Publish artifact to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn deploy --no-transfer-progress -DskipTests
        working-directory: fashion-app-mongodb

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: fashion-app-mongodb/target/site/jacoco/

      - name: Upload failsafe reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: fashion-app-mongodb/target/failsafe-reports/
