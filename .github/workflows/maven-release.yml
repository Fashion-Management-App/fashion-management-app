name: Maven Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version (e.g. 0.2.0)'
        required: true
      developmentVersion:
        description: 'Next development version (e.g. 0.3.0-SNAPSHOT)'
        required: true

jobs:
  release:
    name: Maven Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: RELEASE_TOKEN

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          echo '<settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.RELEASE_TOKEN }}</password>
              </server>
            </servers>
          </settings>' > ~/.m2/settings.xml

      - name: Run Maven Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          mvn release:prepare release:perform \
            --no-transfer-progress \
            -s ~/.m2/settings.xml \
            -DreleaseVersion=${{ github.event.inputs.releaseVersion }} \
            -DdevelopmentVersion=${{ github.event.inputs.developmentVersion }} \
            -DscmCommentPrefix="[release] " \
            -Darguments="-DskipTests -s $HOME/.m2/settings.xml"
        working-directory: fashion-app-mongodb

      - name: Generate Release Notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.releaseVersion }}
          name: Fashion Management Application v${{ github.event.inputs.releaseVersion }}
          draft: true
          generate_release_notes: true
          token: ${{ secrets.RELEASE_TOKEN }}
